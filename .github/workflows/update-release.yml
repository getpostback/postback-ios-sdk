name: Update Release

# Triggered by the private iOS repo's release workflow via repository_dispatch,
# or manually with a version input.
on:
  repository_dispatch:
    types: [ios-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
      xcframework_url:
        description: 'URL to XCFramework zip'
        required: true

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set version from dispatch
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RAW_VERSION="${{ github.event.client_payload.version }}"
            echo "url=${{ github.event.client_payload.xcframework_url }}" >> "$GITHUB_OUTPUT"
          else
            RAW_VERSION="${{ github.event.inputs.version }}"
            echo "url=${{ github.event.inputs.xcframework_url }}" >> "$GITHUB_OUTPUT"
          fi
          VERSION="${RAW_VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download XCFramework and compute checksum
        id: checksum
        run: |
          curl -fL --retry 3 --retry-delay 5 -o PostbackSDK.xcframework.zip "${{ steps.version.outputs.url }}"
          unzip -t PostbackSDK.xcframework.zip >/dev/null
          TMP_DIR="$(mktemp -d)"
          unzip -q PostbackSDK.xcframework.zip -d "$TMP_DIR"

          DEVICE_BINARY="$TMP_DIR/PostbackSDK.xcframework/ios-arm64/PostbackSDK.framework/PostbackSDK"
          DEVICE_DSYM="$TMP_DIR/PostbackSDK.xcframework/ios-arm64/dSYMs/PostbackSDK.framework.dSYM"
          SIM_BINARY="$TMP_DIR/PostbackSDK.xcframework/ios-arm64_x86_64-simulator/PostbackSDK.framework/PostbackSDK"
          SIM_DSYM="$TMP_DIR/PostbackSDK.xcframework/ios-arm64_x86_64-simulator/dSYMs/PostbackSDK.framework.dSYM"

          for REQUIRED_PATH in \
            "$DEVICE_BINARY" \
            "$DEVICE_DSYM/Contents/Resources/DWARF/PostbackSDK" \
            "$SIM_BINARY" \
            "$SIM_DSYM/Contents/Resources/DWARF/PostbackSDK"
          do
            test -e "$REQUIRED_PATH"
          done

          verify_dsym_uuids() {
            local binary="$1"
            local dsym="$2"
            local label="$3"
            local missing

            missing="$(comm -23 \
              <(dwarfdump --uuid "$binary" | awk '{ print $2 }' | sort -u) \
              <(dwarfdump --uuid "$dsym" | awk '{ print $2 }' | sort -u))"

            if [ -n "$missing" ]; then
              echo "Missing $label dSYM UUID(s): $missing"
              exit 1
            fi
          }

          verify_dsym_uuids "$DEVICE_BINARY" "$DEVICE_DSYM" "device"
          verify_dsym_uuids "$SIM_BINARY" "$SIM_DSYM" "simulator"
          CHECKSUM=$(swift package compute-checksum PostbackSDK.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          rm PostbackSDK.xcframework.zip

      - name: Update Package.swift
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s|url: \".*\"|url: \"https://github.com/getpostback/postback-ios-sdk/releases/download/${RELEASE_TAG}/PostbackSDK.xcframework.zip\"|" Package.swift
          sed -i '' "s|checksum: \".*\"|checksum: \"${CHECKSUM}\"|" Package.swift
          sed -i '' "s/from: \"[0-9][0-9.]*\"/from: \"${VERSION}\"/" README.md
          sed -i '' "s/from \`[0-9][0-9.]*\`/from \`${VERSION}\`/" README.md
          sed -i '' "s/~> [0-9][0-9.]*/~> ${VERSION}/" README.md

      - name: Update podspec version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/s.version          = '.*'/s.version          = '${VERSION}'/" PostbackSDK.podspec

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift PostbackSDK.podspec README.md
          if git diff --cached --quiet; then
            echo "No package metadata changes for ${RELEASE_TAG}"
            PACKAGE_CHANGED=false
          else
            git commit -m "Release ${RELEASE_TAG}"
            git push origin main
            PACKAGE_CHANGED=true
          fi
          if [ "${PACKAGE_CHANGED}" = "true" ]; then
            git tag -f "${RELEASE_TAG}"
            git push origin "refs/tags/${RELEASE_TAG}" --force
          elif git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists"
          else
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Re-upload XCFramework to this repo's release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          curl -fL --retry 3 --retry-delay 5 -o PostbackSDK.xcframework.zip "${{ steps.version.outputs.url }}"
          unzip -t PostbackSDK.xcframework.zip >/dev/null
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" PostbackSDK.xcframework.zip --clobber
          else
            gh release create "${RELEASE_TAG}" \
              PostbackSDK.xcframework.zip \
              --title "PostbackSDK ${RELEASE_TAG}" \
              --notes "Binary XCFramework for PostbackSDK ${VERSION}. Includes matching dSYMs for App Store Connect upload validation."
          fi
          rm PostbackSDK.xcframework.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to CocoaPods
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if pod trunk info PostbackSDK 2>/dev/null | grep -Fq -- "- ${VERSION} ("; then
            echo "PostbackSDK ${VERSION} is already published"
            exit 0
          fi

          if pod trunk push PostbackSDK.podspec --allow-warnings --skip-import-validation --skip-tests; then
            exit 0
          fi

          # CocoaPods can accept a spec and still return an internal server
          # error. Re-check trunk before treating the release as failed.
          sleep 5
          pod trunk info PostbackSDK | grep -Fq -- "- ${VERSION} ("
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
